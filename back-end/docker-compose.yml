# MongoDB and Redis for local development.
# Run: docker compose up -d
# Then copy .env.example to .env with:
#   MONGODB_URI=mongodb://localhost:27017/trading-lab
#   REDIS_HOST=localhost
#   REDIS_PORT=6379

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
